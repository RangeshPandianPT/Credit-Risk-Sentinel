version: '3.8'

services:
  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn src.phase3_risk_api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SNS_TOPIC_ARN=arn:aws:sns:local:simulation
      - HIGH_RISK_CUSTOMERS_KEY=high_risk_customers
      - RISK_ALERT_THRESHOLD=70
    volumes:
      - .:/app
    depends_on:
      - redis

  ui:
    build: .
    command: streamlit run src/dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - RISK_API_URL=http://api:8000/score
      - HIGH_RISK_API_URL=http://api:8000/customers/high-risk
      - INTERVENTION_API_URL=http://api:8000/api/notify
    volumes:
      - .:/app
    depends_on:
      - api
